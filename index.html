<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansh Kumar Website</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
  transition: 0.5s;
}

/* DARK MODE */
.dark {
  background: #121212;
  color: white;
}

/* HEADER */
header {
  background: linear-gradient(to right, #c9d84a, #8fcf3c);
  color: white;
  padding: 20px;
  animation: fadeIn 2s;
}

/* NAVBAR */
nav {
  background: #333;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  padding: 14px 20px;
  display: inline-block;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  background: #555;
}

/* SECTION */
section {
  padding: 40px;
  animation: fadeIn 2s;
}

/* IMAGE */
img {
  width: 150px;
  border-radius: 50%;
  box-shadow: 0px 0px 10px gray;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.1);
}

/* BUTTON */
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #45a049;
  transform: scale(1.1);
}

/* FOOTER */
footer {
  background: #ddd;
  padding: 10px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<header>
  <h1>Welcome to My Website</h1>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<section id="home">
  <h2>Home</h2>
  <p>Hello! Welcome to my website 😎</p>
</section>

<section id="about">
  <h2>About</h2>

  <img src="krishna.jpg.jpg">

  <p>My name is <b>Ansh Kumar</b>.</p>
  <p>I am a Class 9 student from India.</p>

  <button onclick="showMessage()">Click Me</button>
</section>

<section id="skills">
  <h2>Skills</h2>
  <p>HTML | CSS | JavaScript</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: ansh@example.com</p>
</section>

<footer>
  <p>© 2026 Ansh Kumar</p>
</footer>

<script>
function showMessage() {
  alert("Hello! Thanks for visiting 😎");
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
